services:
  postgres:
    image: postgres:16-alpine
    container_name: hackton-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackton123}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-upload_db,orchestrator_db,report_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackton}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hackton-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hackton}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hackton123}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hackton-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hackton}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hackton123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: hackton-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:-hackton123}
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

  gateway:
    build:
      context: ../
      dockerfile: src/gateway/Gateway/Dockerfile
    container_name: hackton-gateway
    ports:
      - "5010:8080"
    depends_on:
      - upload-service
      - orchestrator-service
      - report-service
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ReverseProxy__Clusters__upload-cluster__Destinations__destination1__Address=http://upload-service:8080
      - ReverseProxy__Clusters__orchestrator-cluster__Destinations__destination1__Address=http://orchestrator-service:8080
      - ReverseProxy__Clusters__report-cluster__Destinations__destination1__Address=http://report-service:8080

  upload-service:
    build:
      context: ../
      dockerfile: src/upload-service/API/UploadService.API/Dockerfile
    container_name: hackton-upload-service
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=upload_db;Username=${POSTGRES_USER:-hackton};Password=${POSTGRES_PASSWORD:-hackton123}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_USER:-hackton}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-hackton123}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER:-hackton}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD:-hackton123}
      - MinIO__BucketName=${MINIO_BUCKET:-uploads}
      - Seq__Url=http://seq:5341

  orchestrator-service:
    build:
      context: ../
      dockerfile: src/orchestrator-service/API/OrchestratorService.API/Dockerfile
    container_name: hackton-orchestrator-service
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=orchestrator_db;Username=${POSTGRES_USER:-hackton};Password=${POSTGRES_PASSWORD:-hackton123}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_USER:-hackton}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-hackton123}
      - Seq__Url=http://seq:5341

  report-service:
    build:
      context: ../
      dockerfile: src/report-service/API/ReportService.API/Dockerfile
    container_name: hackton-report-service
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=report_db;Username=${POSTGRES_USER:-hackton};Password=${POSTGRES_PASSWORD:-hackton123}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_USER:-hackton}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-hackton123}
      - Seq__Url=http://seq:5341

  analysis-service:
    build:
      context: ../
      dockerfile: src/analysis-service/Dockerfile
    container_name: hackton-analysis-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-hackton}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-hackton123}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-hackton}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-hackton123}
      - MINIO_BUCKET=${MINIO_BUCKET:-uploads}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  seq_data:
