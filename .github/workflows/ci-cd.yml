name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '9.0.x'
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/hackton

jobs:
  # ==========================================
  # STAGE 1: BUILD
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Hackton.sln

      - name: Build solution (Release)
        run: dotnet build Hackton.sln --configuration Release --no-restore

      - name: Publish artifacts
        run: |
          dotnet publish src/gateway/Gateway/Gateway.csproj -c Release -o publish/gateway --no-restore
          dotnet publish src/upload-service/API/UploadService.API/UploadService.API.csproj -c Release -o publish/upload-service --no-restore
          dotnet publish src/orchestrator-service/API/OrchestratorService.API/OrchestratorService.API.csproj -c Release -o publish/orchestrator-service --no-restore
          dotnet publish src/report-service/API/ReportService.API/ReportService.API.csproj -c Release -o publish/report-service --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-apps
          path: publish/
          retention-days: 1

  # ==========================================
  # STAGE 2: TESTS (.NET)
  # ==========================================
  tests-dotnet:
    name: Tests (.NET)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Hackton.sln

      - name: Run unit tests
        run: |
          dotnet test Hackton.sln \
            --configuration Release \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-dotnet
          path: '**/TestResults/**'
          retention-days: 7

  # ==========================================
  # STAGE 2: TESTS (Python - Analysis Service)
  # ==========================================
  tests-python:
    name: Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: src/analysis-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: src/analysis-service
        env:
          CLAUDE_API_KEY: "test-key-not-used-in-unit-tests"
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-python
          path: src/analysis-service/.pytest_cache
          retention-days: 7

  # ==========================================
  # STAGE 3: DEPLOY (Local via Docker Compose)
  # ==========================================
  deploy:
    name: Deploy (Local)
    runs-on: ubuntu-latest
    needs: [build, tests-dotnet, tests-python]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example docker/.env
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> docker/.env

      - name: Build Docker images
        run: |
          docker compose -f docker/docker-compose.yml build

      - name: Start infrastructure
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres rabbitmq minio seq

      - name: Wait for infrastructure health
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" hackton-postgres 2>/dev/null | grep -q healthy; do sleep 2; done'
          echo "Waiting for RabbitMQ..."
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" hackton-rabbitmq 2>/dev/null | grep -q healthy; do sleep 2; done'
          echo "Waiting for MinIO..."
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" hackton-minio 2>/dev/null | grep -q healthy; do sleep 2; done'
          echo "All infrastructure services are healthy!"

      - name: Deploy microservices
        run: |
          docker compose -f docker/docker-compose.yml up -d

      - name: Verify deployment
        run: |
          echo "Waiting for services to start..."
          sleep 15

          echo "Checking Gateway health..."
          curl --retry 5 --retry-delay 3 --retry-connrefused -f http://localhost:5000/health || exit 1

          echo ""
          echo "All services deployed successfully!"
          docker compose -f docker/docker-compose.yml ps

      - name: Show deployment logs
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
