name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Hackton.sln

      - name: Build
        run: dotnet build Hackton.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Hackton.sln --configuration Release --no-restore --verbosity normal

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Gateway Docker image
        run: docker build -f src/gateway/Gateway/Dockerfile -t hackton-gateway:latest .

      - name: Build Upload Service Docker image
        run: docker build -f src/upload-service/API/UploadService.API/Dockerfile -t hackton-upload-service:latest .

      - name: Build Orchestrator Service Docker image
        run: docker build -f src/orchestrator-service/API/OrchestratorService.API/Dockerfile -t hackton-orchestrator-service:latest .

      - name: Build Report Service Docker image
        run: docker build -f src/report-service/API/ReportService.API/Dockerfile -t hackton-report-service:latest .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd docker
          docker compose up -d --build
